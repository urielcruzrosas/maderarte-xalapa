<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nosotros</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f5f5;
    }

    /* CONTENEDOR GENERAL */
    .container {
        width: 90%;
        margin: auto;
        padding: 20px;
    }

    /* TITULO */
    h1 {
        text-align: center;
        margin-bottom: 10px;
    }

    /* NAV */
    .nav {
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        margin-bottom: 30px;
    }

    .nav a {
        margin: 0 15px;
        text-decoration: none;
        color: black;
        font-weight: bold;
    }

    /* ICONOS DERECHA */
    .icons {
        position: absolute;
        right: 0;
        font-size: 18px;
    }

    .icons span {
        margin-left: 10px;
        cursor: pointer;
    }

    /* SECCION PRINCIPAL */
    .main {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    /* IMAGEN GRANDE */
    .image-box {
        width: 40%;
        height: 250px;
        border: 3px solid black;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 60px;
    }

    /* TEXTO DERECHA */
    .text-box {
        width: 50%;
    }

    .text-box h2 {
        margin-bottom: 10px;
    }

    /* SECCION INFERIOR */
    .about {
        text-align: center;
        margin-top: 50px;
    }

</style>

</head>
<body>

<div class="container">

    <!-- TITULO -->
    <h1>Nosotros</h1>

    <!-- MENU -->
    <div class="nav">
        <div>
            <a href="#">Inicio</a>
            <a href="#">Contacto</a>
            <a href="#">Nosotros</a>
        </div>

        <div class="icons">
            <span>⬅️</span>
            <span>🛒</span>
            <span>👤</span>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main">

        <div class="image-box">
            X
        </div>

        <div class="text-box">
            <h2>Nuestra misión:</h2>
            <p>Text</p>
        </div>

    </div>

    <!-- SECCION FINAL -->
    <div class="about">
        <h2>¿Quiénes somos?</h2>
        <p>Text</p>
    </div>

</div>

</body>
</html>
